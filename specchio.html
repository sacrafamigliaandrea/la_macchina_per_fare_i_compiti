<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cinque Chiavi per Rodari — Lo Specchio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&display=swap" rel="stylesheet">
<style>
:root {
  --green: #1B6D3F; --green-light: #2D8659; --green-soft: #E8F1EC; --green-deep: #134A2B;
  --amber: #C4801A; --amber-soft: #FBF1E0; --amber-deep: #9C6515;
  --blue: #2C5F8D; --blue-soft: #E4ECF4;
  --grey-deep: #5A5953; --grey-mid: #8C8B85; --grey-soft: #E5E1D6; --grey-bg: #F5F2E9;
  --bg: #FAF8F3; --ink: #2A2A2A; --ink-soft: #4A4A48;
  --topbar-h: 72px;
}
* { box-sizing: border-box; }
html, body {
  margin: 0; padding: 0; background: var(--bg); color: var(--ink);
  font-family: 'DM Sans', -apple-system, sans-serif;
  font-size: 16px; line-height: 1.55; -webkit-font-smoothing: antialiased;
  min-height: 100vh; overscroll-behavior: none;
}
button { font-family: inherit; }
.app { display: flex; flex-direction: column; min-height: 100vh; min-height: 100dvh; }

.topbar {
  height: var(--topbar-h); background: white; border-bottom: 1px solid var(--grey-soft);
  display: grid; grid-template-columns: auto 1fr auto; align-items: center;
  padding: 0 24px; gap: 24px; flex-shrink: 0; z-index: 50; position: sticky; top: 0;
}
.brand { display: flex; flex-direction: column; line-height: 1.2; }
.brand-row1 { font-family: 'Lora', serif; font-weight: 600; font-size: 17px; color: var(--green-deep); letter-spacing: -0.01em; }
.brand-row1 .accent { color: var(--amber); font-style: italic; font-weight: 500; }
.brand-row2 { font-size: 11px; color: var(--grey-mid); letter-spacing: 0.05em; text-transform: uppercase; margin-top: 1px; }

.chiavi-nav { display: flex; justify-content: center; align-items: center; gap: 6px; }
.chiave {
  background: transparent; border: 1.5px solid transparent; border-radius: 10px;
  padding: 6px 10px; cursor: pointer; transition: all 0.15s ease;
  display: flex; flex-direction: column; align-items: center; gap: 2px;
  color: var(--grey-mid); min-width: 56px; position: relative; text-decoration: none;
  font-family: inherit;
}
.chiave:hover:not(.disabled):not(.active) { background: var(--grey-bg); }
.chiave.active { background: var(--green-soft); border-color: var(--green-light); color: var(--green-deep); cursor: default; }
.chiave.disabled { cursor: not-allowed; opacity: 0.45; }
.chiave-icon { width: 22px; height: 22px; }
.chiave-num { font-size: 9px; font-weight: 700; letter-spacing: 0.1em; line-height: 1; }
.chiave-done {
  position: absolute; top: 2px; right: 2px; width: 12px; height: 12px; border-radius: 50%;
  background: var(--green-light); display: none; align-items: center; justify-content: center;
}
.chiave-done svg { width: 8px; height: 8px; color: white; }
.chiave.completed .chiave-done { display: flex; }
.chiave.completed:not(.active) { color: var(--green-deep); opacity: 1; }
@keyframes chiave-celebra { 0%{transform:scale(1)} 40%{transform:scale(1.18)} 70%{transform:scale(0.96)} 100%{transform:scale(1)} }
.chiave.celebrating .chiave-done { animation: chiave-celebra 0.7s ease-out; }

.right-block { display: flex; align-items: center; gap: 12px; }
.progress-pill { display: inline-flex; align-items: center; gap: 8px; padding: 6px 14px; background: var(--grey-bg); border-radius: 100px; font-size: 13px; color: var(--grey-deep); font-weight: 500; }
.progress-dots { display: inline-flex; gap: 4px; }
.progress-dots .dot { width: 9px; height: 9px; border-radius: 50%; background: var(--grey-soft); transition: background 0.2s; }
.progress-dots .dot.chosen { background: var(--green-light); }

.icon-btn {
  background: white; border: 1px solid var(--grey-soft); border-radius: 8px;
  width: 36px; height: 36px; cursor: pointer; display: flex; align-items: center; justify-content: center;
  color: var(--grey-deep); transition: all 0.15s;
}
.icon-btn:hover { border-color: var(--grey-mid); background: var(--grey-bg); }
.icon-btn svg { width: 16px; height: 16px; }

@media (max-width: 720px) {
  .topbar { padding: 0 12px; gap: 12px; }
  .brand-row1 { font-size: 14px; } .brand-row2 { font-size: 10px; }
  .chiave { min-width: 40px; padding: 4px 6px; }
  .chiave-num { display: none; } .chiave-icon { width: 20px; height: 20px; }
  .progress-pill { display: none; }
}

.specchio-page {
  flex: 1; padding: 28px 24px 40px; max-width: 1140px; width: 100%; margin: 0 auto;
}
.situation-header { display: flex; align-items: baseline; gap: 16px; margin-bottom: 8px; flex-wrap: wrap; }
.situation-counter { font-family: 'Lora', serif; font-style: italic; font-size: 14px; color: var(--amber); font-weight: 500; }
.situation-title { font-family: 'Lora', serif; font-weight: 600; font-size: 26px; color: var(--green-deep); letter-spacing: -0.01em; margin: 0; }

.mirror-split {
  display: grid; grid-template-columns: 1fr auto 1fr; gap: 0;
  margin: 24px 0 0; align-items: stretch; position: relative;
}
.situation-side {
  padding: 24px 28px 24px 4px;
  font-family: 'Lora', serif; font-size: 17px; line-height: 1.65; color: var(--ink);
}
.opening {
  font-size: 12px; text-transform: uppercase; letter-spacing: 0.1em;
  color: var(--grey-mid); font-family: 'DM Sans', sans-serif; font-weight: 500;
  font-style: normal; margin-bottom: 10px; display: block;
}
.mirror-glass {
  width: 1px; margin: 0 4px; position: relative;
  background: linear-gradient(to bottom, transparent 0%, var(--grey-mid) 15%, var(--grey-mid) 85%, transparent 100%);
}
.mirror-glass::before {
  content: ""; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
  width: 18px; height: 18px; border-radius: 50%; background: var(--bg); border: 1.5px solid var(--grey-mid);
}
.mirror-glass::after {
  content: ""; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
  width: 6px; height: 6px; border-radius: 50%; background: var(--grey-mid);
}
.choices-side { padding: 24px 4px 24px 28px; display: flex; flex-direction: column; gap: 12px; }

.choice-card {
  background: white; border: 1.5px solid var(--grey-soft); border-radius: 12px;
  padding: 16px 18px; cursor: pointer; transition: all 0.18s ease;
  text-align: left; font-family: 'Lora', serif; font-size: 15px; line-height: 1.5;
  color: var(--ink-soft); position: relative; display: block; width: 100%;
}
.choice-card:hover:not(.chosen):not(.dimmed) {
  border-color: var(--green-light); background: #FCFCF8;
  transform: translateY(-1px); box-shadow: 0 4px 12px rgba(27, 109, 63, 0.08);
}
.choice-card.chosen {
  border-color: var(--green-light); background: var(--green-soft);
  color: var(--green-deep); cursor: default; font-weight: 500;
}
.choice-card.dimmed { opacity: 0.42; cursor: default; }
.choice-letter {
  display: inline-block; font-family: 'DM Sans', sans-serif; font-style: normal;
  font-weight: 700; font-size: 10px; letter-spacing: 0.12em;
  color: var(--grey-mid); margin-right: 8px; vertical-align: middle;
}
.choice-card.chosen .choice-letter { color: var(--green); }

.mirror-band {
  margin-top: 24px; padding: 22px 28px; background: white;
  border: 1px solid var(--green-light); border-radius: 14px;
  font-family: 'Lora', serif; font-style: italic; font-size: 16.5px;
  line-height: 1.7; color: var(--ink); position: relative; display: none;
}
.mirror-band.visible { display: block; }
.mirror-band-label {
  position: absolute; top: -10px; left: 20px; background: var(--bg); padding: 0 10px;
  font-family: 'DM Sans', sans-serif; font-style: normal; font-size: 11px;
  text-transform: uppercase; letter-spacing: 0.1em; font-weight: 500; color: var(--green-deep);
}

.next-row { display: flex; justify-content: flex-end; margin-top: 18px; gap: 12px; flex-wrap: wrap; }
.btn-next, .btn-prev {
  font-family: inherit; font-size: 14px; font-weight: 500;
  padding: 10px 22px; border-radius: 100px; border: 1px solid var(--grey-soft);
  background: white; color: var(--ink); cursor: pointer; transition: all 0.15s ease;
  display: inline-flex; align-items: center; gap: 8px;
}
.btn-next:hover, .btn-prev:hover { border-color: var(--grey-mid); }
.btn-next.primary { background: var(--green); border-color: var(--green); color: white; font-weight: 600; }
.btn-next.primary:hover { background: var(--green-deep); border-color: var(--green-deep); }
.btn-next svg, .btn-prev svg { width: 14px; height: 14px; }
.btn-next:disabled, .btn-prev:disabled { opacity: 0.4; cursor: not-allowed; }

@media (max-width: 760px) {
  .specchio-page { padding: 16px 14px 28px; }
  .situation-title { font-size: 20px; }
  .mirror-split { grid-template-columns: 1fr; grid-template-rows: auto auto auto; gap: 12px; }
  .situation-side { padding: 12px 4px; font-size: 15.5px; }
  .choices-side { padding: 12px 4px; }
  .mirror-glass {
    width: 100%; height: 1px;
    background: linear-gradient(to right, transparent 0%, var(--grey-mid) 15%, var(--grey-mid) 85%, transparent 100%);
    margin: 4px 0;
  }
  .mirror-glass::before, .mirror-glass::after { display: none; }
  .mirror-band { padding: 18px 18px 16px; font-size: 15.5px; }
}

.overlay {
  position: fixed; inset: 0; background: rgba(42, 42, 42, 0.55);
  display: flex; align-items: center; justify-content: center;
  z-index: 100; opacity: 0; pointer-events: none; transition: opacity 0.22s ease; padding: 24px;
}
.overlay.open { opacity: 1; pointer-events: auto; }
.overlay-card {
  background: white; border-radius: 18px; padding: 32px 36px; max-width: 560px;
  width: 100%; text-align: center; box-shadow: 0 24px 60px rgba(0, 0, 0, 0.2);
  max-height: 92vh; overflow-y: auto;
}
.overlay-card h2 { margin: 0 0 8px; font-family: 'Lora', serif; font-weight: 600; font-size: 24px; color: var(--green-deep); letter-spacing: -0.01em; }
.overlay-card .body { font-size: 15px; color: var(--ink-soft); margin: 0 0 22px; line-height: 1.65; text-align: left; font-family: 'Lora', serif; }
.icon-large { width: 56px; height: 56px; margin: 0 auto 12px; display: block; }
.modal-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin: 18px 0 22px; }
.modal-stat { background: var(--grey-bg); border-radius: 12px; padding: 14px 8px; }
.modal-stat .num { font-size: 28px; font-weight: 700; color: var(--ink); font-feature-settings: 'tnum'; display: block; }
.modal-stat .lbl { font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--grey-mid); margin-top: 4px; display: block; line-height: 1.3; }

.overlay-actions { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
.btn-overlay {
  font-family: inherit; font-size: 14px; font-weight: 500;
  padding: 10px 22px; border-radius: 100px; border: 1px solid var(--grey-soft);
  background: white; color: var(--ink); cursor: pointer; transition: all 0.15s ease;
}
.btn-overlay:hover { border-color: var(--grey-mid); }
.btn-overlay.primary { background: var(--green); border-color: var(--green); color: white; font-weight: 600; }
.btn-overlay.primary:hover { background: var(--green-deep); border-color: var(--green-deep); }

.toast {
  position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%) translateY(20px);
  background: var(--ink); color: white; padding: 12px 22px; border-radius: 100px;
  font-size: 14px; font-weight: 500; opacity: 0; pointer-events: none;
  transition: all 0.22s ease; z-index: 90; max-width: 90vw; text-align: center;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="app">
  <header class="topbar">
    <div class="brand">
      <div class="brand-row1">Cinque Chiavi per <span class="accent">Rodari</span></div>
      <div class="brand-row2">La macchina per fare i compiti · Lo Specchio</div>
    </div>
    <nav class="chiavi-nav" aria-label="Cinque chiavi">
      <a class="chiave" data-level="1" title="Livello 1 — La Lente">
        <svg class="chiave-icon" viewBox="0 0 32 32" fill="none" stroke="currentColor" stroke-width="1.8">
          <circle cx="13" cy="13" r="7.5"/><line x1="18.5" y1="18.5" x2="25" y2="25" stroke-linecap="round"/>
        </svg>
        <span class="chiave-num">L1</span>
        <span class="chiave-done"><svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="2.5,6.5 5,9 9.5,3.5"/></svg></span>
      </a>
      <a class="chiave" data-level="2" title="Livello 2 — La Bussola">
        <svg class="chiave-icon" viewBox="0 0 32 32" fill="none" stroke="currentColor" stroke-width="1.8">
          <circle cx="16" cy="16" r="11"/><polygon points="16,8 19,16 16,24 13,16" fill="currentColor" stroke="none"/><circle cx="16" cy="16" r="1.6" fill="white"/>
        </svg>
        <span class="chiave-num">L2</span>
        <span class="chiave-done"><svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="2.5,6.5 5,9 9.5,3.5"/></svg></span>
      </a>
      <a class="chiave active" data-level="3" title="Livello 3 — Lo Specchio">
        <svg class="chiave-icon" viewBox="0 0 32 32" fill="none" stroke="currentColor" stroke-width="1.8">
          <ellipse cx="16" cy="16" rx="9" ry="11"/><line x1="7" y1="16" x2="25" y2="16" stroke-dasharray="2 2"/>
        </svg>
        <span class="chiave-num">L3</span>
        <span class="chiave-done"><svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="2.5,6.5 5,9 9.5,3.5"/></svg></span>
      </a>
      <a class="chiave" data-level="4" data-url="ponte.html" title="Livello 4 — Il Ponte">
        <svg class="chiave-icon" viewBox="0 0 32 32" fill="none" stroke="currentColor" stroke-width="1.8">
          <path d="M4 22 Q 16 8, 28 22"/><line x1="4" y1="22" x2="28" y2="22"/>
          <line x1="11" y1="22" x2="11" y2="16"/><line x1="16" y1="22" x2="16" y2="13"/><line x1="21" y1="22" x2="21" y2="16"/>
        </svg>
        <span class="chiave-num">L4</span>
      </a>
      <a class="chiave" data-level="5" data-url="taccuino.html" title="Livello 5 — Il Taccuino">
        <svg class="chiave-icon" viewBox="0 0 32 32" fill="none" stroke="currentColor" stroke-width="1.8">
          <rect x="7" y="5" width="18" height="22" rx="1"/>
          <line x1="11" y1="11" x2="21" y2="11"/><line x1="11" y1="15" x2="21" y2="15"/><line x1="11" y1="19" x2="18" y2="19"/>
        </svg>
        <span class="chiave-num">L5</span>
      </a>
    </nav>
    <div class="right-block">
      <div class="progress-pill" title="Situazioni attraversate">
        <span id="progress-text">0/5</span>
        <span class="progress-dots" id="progress-dots"></span>
      </div>
      <button class="icon-btn" id="btn-restart-top" title="Ricomincia">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M2 7.5a5.5 5.5 0 1 1 1.6 3.9"/><polyline points="2 4 2 7.5 5.5 7.5"/>
        </svg>
      </button>
    </div>
  </header>

  <main class="specchio-page">
    <div class="situation-header">
      <span class="situation-counter" id="ep-counter">Situazione 1 di 5</span>
      <h1 class="situation-title" id="ep-title">Caricamento…</h1>
    </div>

    <div class="mirror-split">
      <div class="situation-side">
        <span class="opening">La situazione</span>
        <p id="situation-text">…</p>
      </div>
      <div class="mirror-glass" aria-hidden="true"></div>
      <div class="choices-side">
        <span class="opening">Cosa fai?</span>
        <button class="choice-card" data-option="A">
          <span class="choice-letter">A</span><span class="choice-text"></span>
        </button>
        <button class="choice-card" data-option="B">
          <span class="choice-letter">B</span><span class="choice-text"></span>
        </button>
        <button class="choice-card" data-option="C">
          <span class="choice-letter">C</span><span class="choice-text"></span>
        </button>
      </div>
    </div>

    <div class="mirror-band" id="mirror-band">
      <span class="mirror-band-label">Lo specchiamento</span>
      <span id="mirror-text"></span>
    </div>

    <div class="next-row">
      <button class="btn-prev" id="btn-prev">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="7,4 3,8 7,12"/><line x1="3" y1="8" x2="13" y2="8"/>
        </svg>
        <span>Indietro</span>
      </button>
      <button class="btn-next primary" id="btn-next">
        <span id="btn-next-label">Prossima situazione</span>
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="3" y1="8" x2="13" y2="8"/><polyline points="9,4 13,8 9,12"/>
        </svg>
      </button>
    </div>
  </main>
</div>

<div class="overlay" id="finish-overlay">
  <div class="overlay-card">
    <svg class="icon-large" viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="2" style="color: var(--green-light);">
      <ellipse cx="24" cy="24" rx="14" ry="18"/>
      <line x1="10" y1="24" x2="38" y2="24" stroke-dasharray="3 3"/>
    </svg>
    <h2 id="finish-title">Hai attraversato lo Specchio</h2>
    <p class="body" id="finish-body"></p>
    <div class="modal-stats">
      <div class="modal-stat"><span class="num" id="m-a">0</span><span class="lbl">Da solo</span></div>
      <div class="modal-stat"><span class="num" id="m-b">0</span><span class="lbl">Con la macchina</span></div>
      <div class="modal-stat"><span class="num" id="m-c">0</span><span class="lbl">Insieme</span></div>
    </div>
    <div class="overlay-actions">
      <button class="btn-overlay" id="finish-back">Torna alle situazioni</button>
      <button class="btn-overlay" id="finish-restart">Ricomincia</button>
      <button class="btn-overlay primary" id="finish-next">
        Prossima chiave
        <svg viewBox="0 0 16 16" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-left: 4px; vertical-align: -2px;">
          <line x1="3" y1="8" x2="13" y2="8"/><polyline points="9,4 13,8 9,12"/>
        </svg>
      </button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const LEVEL = 3;

const CHIAVI_INFO = {
  1: { name: 'La Lente',    url: 'index.html' },
  2: { name: 'La Bussola',  url: 'bussola.html' },
  3: { name: 'Lo Specchio', url: '' },
  4: { name: 'Il Ponte',    url: 'ponte.html' },
  5: { name: 'Il Taccuino', url: 'taccuino.html' }
};

const SITUATIONS = [
  {
    title: "Il tema di italiano",
    text: "Domani devi consegnare un tema di italiano. Lo apri stasera, dopo cena, ed è un argomento difficile: «Una scelta importante che hai fatto». Le prime righe non vengono, fissi il foglio bianco. Sai che potresti chiedere a ChatGPT di scriverlo per te — basta una richiesta, e arriva un testo pronto. Cosa fai?",
    choices: {
      A: { text: "Comincio a scrivere lo stesso, anche se le frasi vengono goffe. Almeno sono le mie.",
           mirror: "Stai facendo come il bambino di Rodari alla fine della favola — quando, dopo l'incubo della gabbia, corre a fare i compiti. Sa che il cervello fermo è una prigione. Il tema può venirti male, ma è il tuo cervello che lo sta facendo, ed è questa la cosa importante. Le frasi goffe oggi diventeranno frasi tue domani." },
      B: { text: "Chiedo a ChatGPT di scrivermi il tema. Lo leggo e lo consegno.",
           mirror: "Stai facendo come il bambino di Rodari all'inizio — quando dice «comprami la macchina, babbo». La differenza è che ChatGPT non ti chiede il cervello in cambio: te lo lascia fermo, inattivo. Il tema arriverà perfetto. Ma chi avrà scritto «la tua» scelta importante: tu, o lui?" },
      C: { text: "Chiedo a ChatGPT solo qualche idea o spunto. Poi scrivo io, con le mie parole.",
           mirror: "Stai usando la macchina ma tenendoti il cervello acceso. Non sei il bambino dell'inizio (che vuole tutto già fatto), né quello della fine (che fa tutto da solo). È una terza via: la macchina ti dà spunti, le parole restano tue. Molti adulti, oggi, lavorano esattamente così." }
    }
  },
  {
    title: "L'app dei problemi di matematica",
    text: "Un compagno ti mostra un'app sul telefono: fotografa il problema di matematica del libro, e dopo due secondi compare la soluzione con tutti i passaggi spiegati. «Così risparmi un'ora ogni pomeriggio», ti dice. Hai 8 problemi da fare per domani. Cosa fai?",
    choices: {
      A: { text: "Provo a risolverli da solo. Ci metterò più tempo, ma è così che si impara la matematica.",
           mirror: "Stai facendo lavorare il tuo cervello come una bicicletta: anche se pedalare in salita è faticoso, è quello sforzo che ti rende capace di pedalare più forte la volta dopo. Il bambino di Rodari, alla fine, sceglie esattamente questa fatica." },
      B: { text: "Uso l'app per fotografare tutti i problemi. In dieci minuti ho finito.",
           mirror: "I problemi arrivano risolti, ma non sai più come ci si è arrivati. È come avere un autobus che ti porta sempre a destinazione senza che tu impari la strada: il giorno che l'autobus non c'è, ti perdi. La macchina di Rodari «faceva tutto da sola in un minuto». E il cervello del bambino finiva nella borsetta." },
      C: { text: "Faccio prima da solo. Quando mi blocco su un problema, controllo solo quello con l'app.",
           mirror: "Stai trattando l'app come una bussola, non come un autista: prima provi tu a orientarti, poi la guardi quando ti sei perso davvero. Così la matematica ti entra nelle dita, ma quando proprio ti blocchi non resti a vuoto." }
    }
  },
  {
    title: "La traduzione di inglese",
    text: "Domani hai un'interrogazione di inglese: devi presentare la traduzione di un brano. C'è Google Traduttore aperto sul telefono — in trenta secondi avresti tutta la traduzione, da imparare a memoria. Sul tavolo, accanto al brano, c'è anche il dizionario di carta. Cosa fai?",
    choices: {
      A: { text: "Apro il dizionario e traduco parola per parola. Ci metto un'ora, ma quelle parole me le ricordo.",
           mirror: "Imparare l'inglese parola per parola è lento, faticoso, e ogni vocabolo conquistato ti resta. È come costruire una casa mattone per mattone: ci vuole tempo, ma alla fine la casa è tua, e sai come tenerla in piedi. Il bambino di Rodari, alla fine della favola, avrebbe detto «sì, è proprio così che si fa»." },
      B: { text: "Incollo il brano in Google Traduttore. Imparo a memoria e domani ripeto.",
           mirror: "Domani all'interrogazione la traduzione sarà perfetta. Ma se l'insegnante ti chiede «come si dice albero in inglese?», non te lo ricordi — perché quella parola non l'hai mai cercata davvero. Senza il cervello acceso, anche imparando a memoria, sei come il bambino nella gabbia: dipendi dall'app per ogni parola nuova." },
      C: { text: "Provo prima da solo. Quando ho finito, controllo con Google le frasi su cui ero incerto.",
           mirror: "Stai trattando Google Traduttore come un correttore: tu provi, lui ti dice se sei stato vicino. È esattamente il modo in cui lavorano i traduttori veri: non chiedono la traduzione, chiedono la verifica. Così l'inglese ti entra davvero, e ogni controllo è un piccolo passo avanti." }
    }
  },
  {
    title: "Il riassunto del libro",
    text: "Dovevi leggere «Il giardino dei Finzi-Contini» per oggi, e fare un riassunto. Non l'hai letto. Su internet trovi venti riassunti pronti, alcuni anche molto belli. Tra un'ora suona la campanella di italiano. Cosa fai?",
    choices: {
      A: { text: "Provo a leggere il più possibile in un'ora e scrivo quello che ho capito davvero. Sarà incompleto, ma è il mio.",
           mirror: "Stai consegnando qualcosa di imperfetto, ma onesto. Forse prenderai un voto basso, ma sai cosa sai davvero — e quello che non sai puoi recuperarlo. Nella favola di Rodari il bambino, quando si sveglia dall'incubo, non finge nulla: si mette a fare i compiti perché ha capito che il cervello finto non gli serve." },
      B: { text: "Copio uno dei riassunti pronti. Cambio qualche parola così non si vede.",
           mirror: "Stai consegnando il lavoro di qualcun altro come se fosse il tuo. Forse l'insegnante non se ne accorge, e prendi un voto migliore di quello che meriti. Ma sai che non l'hai letto, e fra un mese, all'interrogazione, ti chiederanno cose che non sai. Il cervello del bambino di Rodari, ricordi, finiva in una borsetta." },
      C: { text: "Leggo prima un riassunto online per capire la trama. Poi scrivo io con le mie parole, e dico all'insegnante che non ho finito di leggere.",
           mirror: "Stai facendo una cosa scomoda: usi internet per capire la trama, scrivi tu, e dici la verità sul fatto che non hai finito il libro. È più difficile del copiare e più difficile del fingere. Ma è la strada di chi vuole crescere senza nascondersi." }
    }
  },
  {
    title: "La presentazione orale",
    text: "Devi preparare una presentazione orale di scienze sul sistema solare. Su YouTube trovi un video bellissimo, fatto da uno scienziato, che lo spiega in modo chiaro e affascinante. Praticamente potresti ripetere quello che dice lui — è già perfetto. Cosa fai?",
    choices: {
      A: { text: "Studio sui miei appunti e libri. Costruisco le mie frasi, anche se sono meno belle del video.",
           mirror: "Le tue parole saranno meno fluide di quelle dello scienziato, ma sono tue. Quando l'insegnante ti farà una domanda, troverai la risposta dentro di te — non in un video che hai visto. La presentazione sarà più semplice, ma sarà tua: un piccolo edificio che hai costruito con i tuoi mattoni." },
      B: { text: "Guardo il video tre volte. Imparo a memoria le frasi più belle. Domani ripeto quelle.",
           mirror: "Domani sembrerai molto preparato. Ma se l'insegnante esce dal copione e chiede «cosa pensi tu di questo?», rimani in silenzio — perché quel pensiero non c'è. Hai «comprato la macchina», come dice l'omino di Rodari: la macchina fa il lavoro, ma tu sei rimasto leggero leggero, senza cervello attivo." },
      C: { text: "Guardo il video per farmi un'idea chiara. Poi prendo gli appunti dai miei libri e costruisco la presentazione con le mie parole.",
           mirror: "Stai facendo come uno studioso vero: prima ascolti, poi rielabori. Il video ti dà la struttura, i tuoi appunti i dettagli, e tu combini le due cose con la tua voce. È il modo in cui si impara davvero: non rifiutando le risorse, ma usandole come trampolino per il proprio pensiero." }
    }
  }
];

const state = {
  currentSituation: 0,
  situations: SITUATIONS.map(() => ({ chosen: null }))
};

function showToast(message, duration) {
  const t = document.getElementById('toast');
  t.textContent = message;
  t.className = 'toast show';
  clearTimeout(showToast._t);
  showToast._t = setTimeout(() => { t.className = 'toast'; }, duration || 2000);
}

function markLevelCompleted(level) {
  const btn = document.querySelector(`.chiave[data-level="${level}"]`);
  if (btn) {
    const wasCompleted = btn.classList.contains('completed');
    btn.classList.add('completed');
    if (!wasCompleted) {
      btn.classList.add('celebrating');
      setTimeout(() => btn.classList.remove('celebrating'), 800);
    }
  }
}

function initChiavi() {
  document.querySelectorAll('.chiave').forEach(btn => {
    const lvl = parseInt(btn.dataset.level, 10);
    const info = CHIAVI_INFO[lvl];
    if (lvl === LEVEL) return;
    if (info && info.url) {
      btn.classList.remove('disabled');
      btn.removeAttribute('aria-disabled');
      btn.addEventListener('click', (e) => {
        e.preventDefault();
        window.location.href = info.url;
      });
    } else {
      btn.classList.add('disabled');
      btn.setAttribute('aria-disabled', 'true');
      btn.addEventListener('click', (e) => {
        e.preventDefault();
        showToast(`${info.name} sarà disponibile presto`);
      });
    }
  });
}

function loadSituation(idx) {
  if (idx < 0 || idx >= SITUATIONS.length) return;
  state.currentSituation = idx;
  const s = SITUATIONS[idx];
  const ss = state.situations[idx];

  document.getElementById('ep-counter').textContent = `Situazione ${idx + 1} di ${SITUATIONS.length}`;
  document.getElementById('ep-title').textContent = s.title;
  document.getElementById('situation-text').textContent = s.text;

  ['A', 'B', 'C'].forEach(opt => {
    const card = document.querySelector(`.choice-card[data-option="${opt}"]`);
    card.querySelector('.choice-text').textContent = s.choices[opt].text;
    card.classList.remove('chosen', 'dimmed');
    if (ss.chosen === opt) card.classList.add('chosen');
    else if (ss.chosen !== null) card.classList.add('dimmed');
  });

  const band = document.getElementById('mirror-band');
  const mirrorText = document.getElementById('mirror-text');
  if (ss.chosen) {
    mirrorText.textContent = s.choices[ss.chosen].mirror;
    band.classList.add('visible');
  } else {
    mirrorText.textContent = '';
    band.classList.remove('visible');
  }

  const prevBtn = document.getElementById('btn-prev');
  const nextBtn = document.getElementById('btn-next');
  prevBtn.disabled = idx === 0;
  const isLast = idx === SITUATIONS.length - 1;
  document.getElementById('btn-next-label').textContent = isLast ? 'Concludi lo Specchio' : 'Prossima situazione';
  nextBtn.disabled = !ss.chosen;

  updateProgress();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function onChoiceClick(opt) {
  const idx = state.currentSituation;
  const ss = state.situations[idx];
  ss.chosen = opt;
  loadSituation(idx);
}

function goToNext() {
  const idx = state.currentSituation;
  const ss = state.situations[idx];
  if (!ss.chosen) {
    showToast('Scegli una delle tre opzioni per continuare.');
    return;
  }
  if (idx === SITUATIONS.length - 1) {
    showFinishOverlay();
  } else {
    loadSituation(idx + 1);
  }
}

function goToPrev() {
  if (state.currentSituation > 0) {
    loadSituation(state.currentSituation - 1);
  }
}

function updateProgress() {
  const container = document.getElementById('progress-dots');
  container.innerHTML = '';
  state.situations.forEach(s => {
    const dot = document.createElement('span');
    dot.className = 'dot';
    if (s.chosen) dot.classList.add('chosen');
    container.appendChild(dot);
  });
  const done = state.situations.filter(s => s.chosen).length;
  document.getElementById('progress-text').textContent = `${done}/${SITUATIONS.length}`;
}

function showFinishOverlay() {
  const allChosen = state.situations.every(s => s.chosen);
  if (!allChosen) {
    const remaining = state.situations.filter(s => !s.chosen).length;
    showToast(`Ti restano ${remaining} situazioni da attraversare.`, 2400);
    return;
  }

  const counts = { A: 0, B: 0, C: 0 };
  state.situations.forEach(s => { counts[s.chosen]++; });

  document.getElementById('m-a').textContent = counts.A;
  document.getElementById('m-b').textContent = counts.B;
  document.getElementById('m-c').textContent = counts.C;

  let title, body;
  if (counts.A >= 4) {
    title = "Lo specchio ti restituisce il tuo volto";
    body = "Hai scelto, quasi sempre, di farti carico tu del lavoro. È la via più faticosa delle tre — ma è quella che ti mantiene padrone della tua testa, come il bambino di Rodari quando si sveglia dall'incubo della gabbia.<br><br>Una cosa importante da ricordare: chiedere aiuto, quando serve davvero, non è una scorciatoia. È un'altra forma di intelligenza. Anche un cervello in gamba sa quando appoggiarsi a uno strumento.";
  } else if (counts.B >= 4) {
    title = "Lo specchio ti restituisce una domanda";
    body = "Hai scelto, quasi sempre, di affidarti alle macchine. Non c'è giudizio in questa app — ma c'è una domanda: chi sta lavorando, tu o loro?<br><br>Il bambino di Rodari, nella favola, lo capisce solo dentro un incubo, finendo in gabbia. A te quella domanda arriva oggi, senza incubo: cosa stai costruendo del tuo cervello, mentre lasci che le macchine costruiscano i tuoi compiti?";
  } else if (counts.C >= 4) {
    title = "Lo specchio ti restituisce un equilibrio";
    body = "Hai scelto, quasi sempre, una via di mezzo: usi le macchine, ma resti tu a guidare. È la posizione più matura tra le tre — anche la più impegnativa, perché devi capire ogni volta dove fermarti.<br><br>Molti adulti, oggi, cercano proprio questo equilibrio, e non sempre lo trovano. Tu lo stai già esercitando.";
  } else {
    title = "Lo specchio ti restituisce una mappa varia";
    body = `Hai fatto scelte diverse: ${counts.A} volte hai voluto fare tutto da solo, ${counts.B} volte ti sei affidato alle macchine, ${counts.C} volte hai cercato la via di mezzo.<br><br>Anche questo è un modo di stare nel mondo: situazione per situazione, decidere caso per caso. La domanda da farsi è: <em>in quali situazioni</em> hai scelto cosa? Forse alcune scorciatoie le hai prese perché eri stanco. Forse alcune fatiche le hai cercate perché ti interessavano davvero. È utile guardarsi e capire.`;
  }

  document.getElementById('finish-title').textContent = title;
  document.getElementById('finish-body').innerHTML = body;

  const nextBtn = document.getElementById('finish-next');
  const nextUrl = CHIAVI_INFO[LEVEL + 1] && CHIAVI_INFO[LEVEL + 1].url;
  nextBtn.style.display = nextUrl ? '' : 'none';

  document.getElementById('finish-overlay').classList.add('open');
  markLevelCompleted(LEVEL);
}

function closeFinishOverlay() {
  document.getElementById('finish-overlay').classList.remove('open');
}

function goToNextChiave() {
  const url = CHIAVI_INFO[LEVEL + 1] && CHIAVI_INFO[LEVEL + 1].url;
  if (url) {
    closeFinishOverlay();
    window.location.href = url;
  }
}

function restartLevel() {
  if (!confirm('Vuoi ricominciare lo Specchio? Tutte le tue scelte verranno azzerate.')) return;
  state.currentSituation = 0;
  state.situations = SITUATIONS.map(() => ({ chosen: null }));
  closeFinishOverlay();
  loadSituation(0);
}

document.addEventListener('DOMContentLoaded', () => {
  initChiavi();
  loadSituation(0);
  updateProgress();

  document.querySelectorAll('.choice-card').forEach(card => {
    card.addEventListener('click', () => onChoiceClick(card.dataset.option));
  });

  document.getElementById('btn-next').addEventListener('click', goToNext);
  document.getElementById('btn-prev').addEventListener('click', goToPrev);
  document.getElementById('btn-restart-top').addEventListener('click', restartLevel);

  document.getElementById('finish-back').addEventListener('click', closeFinishOverlay);
  document.getElementById('finish-restart').addEventListener('click', restartLevel);
  document.getElementById('finish-next').addEventListener('click', goToNextChiave);

  document.addEventListener('keydown', e => {
    if (document.activeElement && ['INPUT', 'TEXTAREA'].includes(document.activeElement.tagName)) return;
    if (e.key === 'ArrowRight') { e.preventDefault(); goToNext(); }
    if (e.key === 'ArrowLeft') { e.preventDefault(); goToPrev(); }
  });
});
</script>

</body>
</html>
